<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Swap Video - GPU</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0D0D14; color: #ffffff;
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center; padding: 20px;
        }
        .container {
            background: #1A1A2E; border-radius: 16px;
            padding: 32px; max-width: 600px; width: 100%;
            border: 1px solid #2A2A45;
        }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #A0A0C0; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #A0A0C0; margin-bottom: 8px; font-weight: 500; }
        input[type="text"] {
            width: 100%; padding: 10px 14px;
            background: #0D0D14; border: 1px solid #2A2A45;
            border-radius: 8px; color: #ffffff; font-size: 14px; outline: none;
        }
        input[type="text"]:focus { border-color: #7C3AED; }
        .file-wrapper {
            position: relative;
            background: #0D0D14; border: 1px dashed #2A2A45;
            border-radius: 8px; padding: 20px; text-align: center;
            cursor: pointer; overflow: hidden;
        }
        .file-wrapper:hover { border-color: #7C3AED; }
        .file-wrapper input[type="file"] {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 10;
        }
        .file-icon { font-size: 28px; margin-bottom: 8px; }
        .file-text { font-size: 13px; color: #A0A0C0; }
        .file-name { font-size: 13px; color: #7C3AED; margin-top: 4px; font-weight: 500; min-height: 18px; }
        .btn-swap {
            width: 100%; padding: 14px; background: #7C3AED;
            color: #ffffff; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px;
        }
        .btn-swap:hover { background: #6D28D9; }
        .btn-swap:disabled { background: #3D2070; cursor: not-allowed; opacity: 0.6; }
        .status { margin-top: 16px; font-size: 14px; text-align: center; min-height: 20px; }
        .success { color: #10B981; }
        .error { color: #EF4444; }
        .info { color: #A0A0C0; }
        .progress-bar { display: none; margin-top: 12px; height: 4px; background: #2A2A45; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #7C3AED; transition: width 0.3s; }
        .result-section { display: none; margin-top: 24px; }
        .result-title { font-size: 16px; color: #10B981; margin-bottom: 12px; }
        video { width: 100%; border-radius: 8px; background: #000; }
        .btn-download {
            display: block; width: 100%; padding: 12px; background: #10B981;
            color: #ffffff; border: none; border-radius: 8px; font-size: 14px;
            font-weight: 600; text-align: center; margin-top: 12px; text-decoration: none;
        }
        .btn-download:hover { background: #059669; }
        .divider { border: none; border-top: 1px solid #2A2A45; margin: 24px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Face Swap Video</h1>
        <p class="subtitle">Powered by InsightFace GPU — Kaggle Backend</p>

        <div class="form-group">
            <label>URL de l'API (localtunnel Kaggle)</label>
            <input type="text" id="apiUrl" placeholder="https://xxxxx.loca.lt" />
        </div>

        <hr class="divider">

        <div class="form-group">
            <label>1. Photo source (ton visage)</label>
            <div class="file-wrapper">
                <input type="file" id="sourceFile" accept="image/*" onchange="updateLabel('sourceFile', 'sourceName')">
                <div class="file-icon">📷</div>
                <div class="file-text">Clique pour choisir une photo</div>
                <div class="file-name" id="sourceName"></div>
            </div>
        </div>

        <div class="form-group">
            <label>2. Vidéo cible</label>
            <div class="file-wrapper">
                <input type="file" id="videoFile" accept="video/*" onchange="updateLabel('videoFile', 'videoName')">
                <div class="file-icon">🎬</div>
                <div class="file-text">Clique pour choisir une vidéo</div>
                <div class="file-name" id="videoName"></div>
            </div>
        </div>

        <button class="btn-swap" id="swapBtn" onclick="doSwap()">⚡ LANCER LE FACE SWAP</button>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="status info" id="status"></div>

        <div class="result-section" id="resultSection">
            <p class="result-title">✅ Résultat</p>
            <video id="resultVideo" controls></video>
            <a class="btn-download" id="downloadLink">💾 Télécharger la vidéo</a>
        </div>
    </div>

    <script>
        let swapping = false;

        function updateLabel(inputId, labelId) {
            const file = document.getElementById(inputId).files[0];
            if (file) document.getElementById(labelId).textContent = file.name;
        }

        async function doSwap() {
            if (swapping) return;
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const sourceFile = document.getElementById('sourceFile').files[0];
            const videoFile = document.getElementById('videoFile').files[0];
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');

            if (!apiUrl) { status.className = 'status error'; status.textContent = "Entre l'URL de l'API !"; return; }
            if (!sourceFile || !videoFile) { status.className = 'status error'; status.textContent = 'Sélectionne une photo et une vidéo !'; return; }

            swapping = true;
            document.getElementById('swapBtn').disabled = true;
            document.getElementById('resultSection').style.display = 'none';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';

            let width = 0;
            const interval = setInterval(() => {
                if (width < 90) { width += Math.random() * 2; progressFill.style.width = Math.min(width, 90) + '%'; }
            }, 500);

            status.className = 'status info';
            status.textContent = '⚡ Face Swap GPU en cours...';

            const formData = new FormData();
            formData.append('source', sourceFile, sourceFile.name);
            formData.append('video', videoFile, videoFile.name);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', apiUrl + '/swap-video');
            xhr.setRequestHeader('bypass-tunnel-reminder', 'true');
            xhr.responseType = 'blob';
            xhr.timeout = 600000;

            xhr.onload = function() {
                clearInterval(interval);
                progressFill.style.width = '100%';
                if (xhr.status === 200) {
                    const url = URL.createObjectURL(xhr.response);
                    document.getElementById('resultVideo').src = url;
                    document.getElementById('downloadLink').href = url;
                    document.getElementById('downloadLink').download = 'faceswap_result.mp4';
                    document.getElementById('resultSection').style.display = 'block';
                    document.getElementById('resultVideo').play();
                    status.className = 'status success';
                    status.textContent = '✅ Face Swap réussi !';
                } else {
                    status.className = 'status error';
                    status.textContent = 'Erreur serveur: ' + xhr.status;
                }
                swapping = false;
                document.getElementById('swapBtn').disabled = false;
            };

            xhr.onerror = function() {
                clearInterval(interval);
                status.className = 'status error';
                status.textContent = 'Erreur connexion — vérifie l\'URL et entre le mot de passe localtunnel dans ton navigateur d\'abord !';
                swapping = false;
                document.getElementById('swapBtn').disabled = false;
            };

            xhr.ontimeout = function() {
                clearInterval(interval);
                status.className = 'status error';
                status.textContent = 'Timeout — vidéo trop longue !';
                swapping = false;
                document.getElementById('swapBtn').disabled = false;
            };

            xhr.send(formData);
        }
    </script>
</body>
</html>
